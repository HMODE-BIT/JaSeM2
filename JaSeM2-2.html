<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JaSeM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg: #0e0e10; --bg2: #16161a; --surface: #1c1c21; --border: #2a2a32;
  --text: #f0f0f4; --text2: #9090a0; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.25);
  --green: #34d399; --red: #f87171;
  --orb-idle: linear-gradient(145deg, #6c63ff, #a855f7);
  --orb-listen: linear-gradient(145deg, #f87171, #fb923c);
  --orb-speak: linear-gradient(145deg, #34d399, #22d3ee);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg: #f5f5f7; --bg2: #ffffff; --surface: #ffffff; --border: #e0e0e8;
  --text: #111118; --text2: #777788; --accent: #5b52f0; --accent-glow: rgba(91,82,240,0.15);
  --green: #059669; --red: #dc2626;
  --orb-idle: linear-gradient(145deg, #5b52f0, #9333ea);
  --orb-listen: linear-gradient(145deg, #dc2626, #ea580c);
  --orb-speak: linear-gradient(145deg, #059669, #0891b2);
  --shadow: 0 8px 32px rgba(0,0,0,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; line-height: 1.5; transition: background 0.3s, color 0.3s; }
#lock, #setup { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; z-index: 1000; padding: 2rem; }
.lock-logo { font-family: 'DM Serif Display', serif; font-size: 4rem; color: var(--text); letter-spacing: -2px; }
.lock-logo span { color: var(--accent); }
.field { width: 100%; max-width: 300px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 0.9rem 1.2rem; color: var(--text); font-size: 1rem; outline: none; text-align: center; }
.btn-primary { width: 100%; max-width: 300px; background: var(--accent); border: none; border-radius: 14px; padding: 0.9rem; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
#app { display: none; flex-direction: column; min-height: 100vh; }
header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
.logo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--text); letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.orb-container { position: relative; }
.orb { width: 140px; height: 140px; border-radius: 50%; background: var(--orb-idle); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; box-shadow: var(--shadow); transition: all 0.3s; }
.orb.listen { background: var(--orb-listen); animation: pulse 1.2s infinite; }
.orb.speak { background: var(--orb-speak); animation: breathe 1.5s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
@keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
.t-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1rem; }
.item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1rem; display: flex; align-items: flex-start; gap: 0.75rem; }
.btn-del { background: none; border: none; color: var(--red); font-size: 1.4rem; cursor: pointer; }
.btn-del:hover { color: #ff4d4d; transform: scale(1.2); }
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lock-logo">Ja<span>S</span>eM</div>
  <input class="field" type="password" id="lp" placeholder="Enter password">
  <button class="btn-primary" onclick="unlock()">Unlock</button>
</div>

<!-- SETUP -->
<div id="setup" style="display:none">
  <div class="lock-logo" style="font-size:2.5rem">Ja<span>S</span>eM</div>
  <input class="field" type="password" id="sp" placeholder="Choose password">
  <div class="seg">
    <button class="seg-btn on" id="s-xai" onclick="selProv('xai')">xAI</button>
    <button class="seg-btn" id="s-gem" onclick="selProv('gemini')">Gemini</button>
  </div>
  <input class="field" type="text" id="sk" placeholder="xai-...">
  <select class="field" id="sv"><option value="eve">Eve</option><option value="ara">Ara</option><option value="rex">Rex</option></select>
  <button class="btn-primary" onclick="doSetup()">Start</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="logo">Ja<span>S</span>eM</div>
    <span class="chip" id="prov-chip" onclick="toggleProv()">xAI</span>
  </header>

  <div class="voice-wrap" style="padding:2rem;text-align:center">
    <button class="orb" id="orb" onclick="tapOrb()">🎙️</button>
    <div id="orb-lbl">Tap to speak</div>
    <button id="end-btn" onclick="stopVoice()" style="display:none">End</button>
  </div>

  <div id="tx-area" style="padding:1rem;display:none">
    <div id="tx-user" style="display:none"><b>You:</b> <span id="tx-user-text"></span></div>
    <div id="tx-ai" style="display:none"><b>JaSeM:</b> <span id="tx-ai-text"></span></div>
  </div>
</div>

<script>
// DATA
const K = 'jasem2';
const ld = () => { try { return JSON.parse(localStorage.getItem(K)||'{}'); } catch { return {}; } };
const sv = d => localStorage.setItem(K, JSON.stringify(d));
const gd = () => { const d=ld(); return { pw:d.pw||null, prov:d.prov||'xai', key:d.key||'', voice:d.voice||'eve', tasks:d.tasks||[], notes:d.notes||[], mem:d.mem||[] }; };
const ud = u => { const d=ld(); sv({...d,...u}); };

// LOCK / SETUP
function selProv(p) {
  document.getElementById('s-xai').classList.toggle('on', p==='xai');
  document.getElementById('s-gem').classList.toggle('on', p==='gemini');
}
async function doSetup() {
  const pw = document.getElementById('sp').value.trim();
  const key = document.getElementById('sk').value.trim();
  if (!pw || !key) return alert('Password and key required');
  ud({ pw: btoa(pw), prov: 'xai', key, voice: 'eve' });
  document.getElementById('setup').style.display = 'none';
  boot();
}
function unlock() {
  const d = gd();
  if (!d.pw) { document.getElementById('lock').style.display='none'; document.getElementById('setup').style.display='flex'; return; }
  if (btoa(document.getElementById('lp').value) === d.pw) {
    document.getElementById('lock').style.display='none';
    boot();
  } else alert('Wrong password');
}
function boot() {
  document.getElementById('app').style.display = 'flex';
}

// EPHEMERAL TOKEN (התיקון היחיד)
async function getXAIClientSecret(apiKey) {
  const res = await fetch('https://api.x.ai/v1/realtime/client_secrets', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  });
  if (!res.ok) throw new Error('Token error ' + res.status);
  const data = await res.json();
  return data.value;
}

// VOICE
let ws = null, connected = false;
let utexts = [], atexts = [];

async function startVoice() {
  const d = gd();
  if (!d.key) return alert('No API key');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    connected = true;
    document.getElementById('orb-lbl').textContent = 'Listening...';
    document.getElementById('end-btn').style.display = 'block';

    if (d.prov === 'xai') {
      await startXAI(d);
    } else {
      // Gemini placeholder - you can add later
      alert('Gemini not implemented in this fix');
    }
  } catch(e) { alert('Microphone error: ' + e.message); }
}

async function startXAI(d) {
  try {
    const token = await getXAIClientSecret(d.key);
    ws = new WebSocket('wss://api.x.ai/v1/realtime', [
      'realtime',
      `xai-client-secret.${token}`
    ]);

    ws.onopen = () => {
      ws.send(JSON.stringify({
        type: 'session.update',
        session: {
          instructions: "You are JaSeM. Be concise.",
          voice: d.voice,
          turn_detection: {type:'server_vad'},
          audio: {input:{format:{type:'audio/pcm',rate:24000}}, output:{format:{type:'audio/pcm',rate:24000}}}
        }
      }));
    };
    ws.onmessage = e => console.log('Message:', JSON.parse(e.data)); // TODO: full handler
    ws.onerror = ws.onclose = stopVoice;
  } catch(e) {
    console.error(e);
    alert('xAI connection failed: ' + e.message);
    stopVoice();
  }
}

function stopVoice() {
  if (ws) ws.close();
  connected = false;
  document.getElementById('end-btn').style.display = 'none';
  document.getElementById('orb-lbl').textContent = 'Tap to speak';
}

// TAP
function tapOrb() {
  if (connected) stopVoice();
  else startVoice();
}

// INIT
window.onload = () => {
  const d = gd();
  if (!d.pw) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
  }
};
</script>
</body>
</html>
