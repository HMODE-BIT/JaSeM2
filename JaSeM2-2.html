<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JaSeM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
[data-theme="dark"] {
  --bg: #0e0e10; --bg2: #16161a; --surface: #1c1c21; --border: #2a2a32;
  --text: #f0f0f4; --text2: #9090a0; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.25);
  --green: #34d399; --red: #f87171;
  --orb-idle: linear-gradient(145deg, #6c63ff, #a855f7);
  --orb-listen: linear-gradient(145deg, #f87171, #fb923c);
  --orb-speak: linear-gradient(145deg, #34d399, #22d3ee);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
[data-theme="light"] { /* אותו דבר כמו קודם */ }
/* ... (כל ה-CSS נשאר בדיוק כמו שהיה – לא שיניתי כלום) ... */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; }
/* ... (כל ה-CSS הקיים – אני לא מעתיק הכל כדי לא להאריך, אבל בקובץ המלא הוא נשאר) ... */
.btn-del { background: none; border: none; color: var(--red); font-size: 1.4rem; padding: 0 8px; cursor: pointer; }
.btn-del:hover { color: #ff4d4d; transform: scale(1.2); }
</style>
</head>
<body>
<!-- כל ה-HTML נשאר בדיוק כמו שהיה (lock, setup, app, tabs וכו') -->
<!-- רק ה-JavaScript משתנה -->

<script>
// ══════════════════════════════════════════
// DATA + THEME + LOCK + SETUP + TABS + PROVIDER + TASKS + NOTES + MEMORY + EXPORT
// (כל הקוד הזה נשאר **בדיוק** כמו שהיה – לא נגעתי)
const K = 'jasem2';
const ld = () => { try { return JSON.parse(localStorage.getItem(K)||'{}'); } catch { return {}; } };
const sv = d => localStorage.setItem(K, JSON.stringify(d));
const gd = () => { const d=ld(); return { pw:d.pw||null, prov:d.prov||'xai', key:d.key||'', voice:d.voice||'eve', tasks:d.tasks||[], notes:d.notes||[], mem:d.mem||[], theme:d.theme||'dark' }; };
const ud = u => { const d=ld(); sv({...d,...u}); };
// ... (כל הפונקציות עד saveMem, clrMem, memCtx וכו' – נשארות אותו דבר)

// ══════════════════════════════════════════
// NEW: EPHEMERAL TOKEN FOR xAI
// ══════════════════════════════════════════
async function getXAIClientSecret(apiKey) {
  const res = await fetch('https://api.x.ai/v1/realtime/client_secrets', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({})
  });
  if (!res.ok) throw new Error(`Failed to get ephemeral token (${res.status})`);
  const data = await res.json();
  return data.value;
}

// ══════════════════════════════════════════
// VOICE (השינוי העיקרי כאן)
// ══════════════════════════════════════════
let ws=null, actx=null, mstream=null, proc=null;
let aq=[], playing=false, csrc=null;
let connected=false, speaking=false;
let utexts=[], atexts=[];
let curItemId=null, samplesOut=0;

function orbSet(state) { /* נשאר אותו דבר */ }

async function startVoice() {
  const d=gd();
  if (!d.key) { alert('No API key. Go to Settings.'); return; }
  utexts=[]; atexts=[];
  try {
    mstream = await navigator.mediaDevices.getUserMedia({audio:true});
    actx = new AudioContext({sampleRate:24000});
    connected=true; orbSet('ready');
    if (d.prov==='xai') await startXAI(d);
    else startGemini(d);
  } catch(e) { alert('Microphone error: '+e.message); }
}

async function startXAI(d) {
  try {
    const token = await getXAIClientSecret(d.key);   // ← כאן מקבלים את ה-token
    ws = new WebSocket('wss://api.x.ai/v1/realtime', [
      'realtime',
      `xai-client-secret.${token}`   // ← הפורמט הנכון של xAI
    ]);

    ws.onopen = () => {
      const instr = `You are JaSeM... ${memCtx()}${tasksCtx()}${notesCtx()}`;
      ws.send(JSON.stringify({
        type:'session.update',
        session: {
          instructions: instr,
          voice: d.voice||'eve',
          turn_detection: {type:'server_vad'},
          audio: { input:{format:{type:'audio/pcm',rate:24000}}, output:{format:{type:'audio/pcm',rate:24000}} },
          tools: xaiTools()
        }
      }));
      startMic();
    };
    ws.onmessage = async e => { await onXAI(JSON.parse(e.data)); };
    ws.onerror = ws.onclose = () => stopVoice();
  } catch(e) {
    alert('xAI connection error: ' + e.message + '\nMake sure your API key is correct.');
    stopVoice();
  }
}

// (כל שאר הפונקציות: onXAI, startGemini, startMic, playQ, stopVoice, doFn, xaiTools, gemFns וכו' – נשארו בדיוק כמו שהיו)

function saveMem(ut, at) {
  if (!ut.length && !at.length) return;
  const d=gd();
  const summary = at.length ? at.join(' ').substring(0,250) : ut[0]?.substring(0,150) || 'Voice conversation';
  d.mem.push({ date:Date.now(), userTexts:ut, aiTexts:at, summary });
  if (d.mem.length>50) d.mem=d.mem.slice(-50);
  ud({mem:d.mem}); rMem();
}

// ... (כל שאר הקוד עד הסוף)
</script>
</body>
</html>
